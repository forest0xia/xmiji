<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — Forest Xia</title>
  <meta name="description" content="Article by Forest Xia (夏明有 / Mingyou Xia).">
  <meta name="keywords" content="Forest Xia, Mingyou Xia, 夏明有">
  <link rel="canonical" href="https://xmiji.com/post.html">
  <link rel="alternate" hreflang="en" href="https://xmiji.com/post.html">
  <link rel="alternate" hreflang="zh" href="https://xmiji.com/post.html">
  <link rel="alternate" hreflang="x-default" href="https://xmiji.com/post.html">
  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="Forest Xia">
  <meta property="og:description" content="Article by Forest Xia (Mingyou Xia).">
  <meta property="og:url" content="https://xmiji.com/post.html">
  <meta property="og:image" content="https://xmiji.com/assets/profile.jpg">
  <meta property="og:site_name" content="Forest Xia">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="zh_CN">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Forest Xia">
  <meta name="twitter:description" content="Article by Forest Xia (Mingyou Xia).">
  <meta name="twitter:image" content="https://xmiji.com/assets/profile.jpg">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="assets/fonts.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-brush: 'Ma Shan Zheng', cursive;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Crimson Pro', serif;
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); overflow-x: hidden; min-height: 100vh; }
    ::selection { background: var(--selection-bg); color: var(--selection-fg); }
    a { color: inherit; text-decoration: none; }

    .bg-ink { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-ink img { width: 100%; height: 100%; object-fit: cover; opacity: var(--bg-opacity); }

    /* ─── Top Bar ─── */
    .top-bar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
      padding: 10px 24px; border-radius: 100px;
      background: var(--glass-bg); backdrop-filter: blur(24px) saturate(1.3); -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow), var(--glass-inset);
      display: flex; align-items: center; gap: 14px;
    }
    .top-seal { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--vermillion); color: var(--seal-color); font-family: var(--font-brush); font-size: 18px; border-radius: 3px; }
    .top-back { font-size: 14px; color: var(--ink-light); display: flex; align-items: center; gap: 5px; transition: color 0.3s ease; }
    .top-back:hover { color: var(--ink); }
    .top-back .cn { font-family: var(--font-brush); font-size: 17px; }
    .top-back svg { width: 14px; height: 14px; }

    /* ─── Filter Toggle (mobile) ─── */
    .filter-toggle {
      display: none; background: none; border: none; padding: 6px; cursor: pointer; color: var(--ink-light);
      -webkit-tap-highlight-color: transparent;
    }
    .filter-toggle svg { width: 18px; height: 18px; }

    /* ─── Filter Overlay (mobile) ─── */
    .filter-overlay {
      display: none; position: fixed; inset: 0; z-index: 200; background: rgba(42,38,34,0.15);
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .filter-overlay.open { opacity: 1; pointer-events: auto; }

    .filter-panel {
      position: absolute; top: 64px; right: 16px; width: 220px;
      padding: 20px 20px; border-radius: 16px;
      background: var(--glass-bg-solid); backdrop-filter: blur(24px) saturate(1.3); -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow), var(--glass-inset);
      transform: translateY(-8px); transition: transform 0.3s ease;
    }
    .filter-overlay.open .filter-panel { transform: translateY(0); }

    .filter-panel .cat-list { list-style: none; max-height: 441px; overflow-y: auto; }
    .filter-panel .cat-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 4px; background: none; border: none; font-family: var(--font-body); font-size: 15px; color: var(--ink-wash); cursor: pointer; text-align: left; border-bottom: 1px solid var(--border); transition: color 0.3s ease; }
    .filter-panel .cat-btn:last-child { border-bottom: none; }
    .filter-panel .cat-btn .cn { font-family: var(--font-brush); font-size: 19px; min-width: 20px; }
    .filter-panel .cat-count { font-size: 11px; color: var(--ink-faint); margin-left: auto; }

    /* ─── Post Content ─── */
    .post {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 100px 40px 80px;
    }

    .post-image {
      width: 100%; overflow: hidden; margin-bottom: 36px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--card-border);
    }
    .post-image img { width: 100%; display: block; }

    /* ─── Image Carousel ─── */
    .post-carousel {
      position: relative; width: 100%; margin-bottom: 36px;
    }
    .post-carousel-track {
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      gap: 0;
    }
    .post-carousel-track::-webkit-scrollbar { display: none; }
    .post-carousel-slide {
      flex: 0 0 100%; scroll-snap-align: start;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--card-border);
      overflow: hidden; cursor: pointer;
    }
    .post-carousel-slide img { width: 100%; display: block; }
    .post-carousel-nav {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--nav-btn-bg); backdrop-filter: blur(4px);
      color: var(--nav-btn-color); cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      opacity: 0; transition: opacity 0.2s ease;
    }
    .post-carousel:hover .post-carousel-nav { opacity: 1; }
    .post-carousel-nav.prev { left: 12px; }
    .post-carousel-nav.next { right: 12px; }
    .post-carousel-nav svg { width: 16px; height: 16px; }
    .post-carousel-dots {
      display: flex; justify-content: center; gap: 8px; margin-top: 14px;
    }
    .post-carousel-dot {
      width: 7px; height: 7px; border-radius: 50%; border: none; padding: 0;
      background: var(--ink-faint); opacity: 0.4; cursor: pointer;
      transition: opacity 0.3s ease, background 0.3s ease;
    }
    .post-carousel-dot.active { opacity: 1; background: var(--vermillion); }

    /* ─── Fullscreen Gallery ─── */
    .fs-gallery {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(20, 18, 16, 0.95);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      will-change: opacity;
    }
    .fs-gallery.open { opacity: 1; pointer-events: auto; }
    .fs-track {
      width: 100%; height: 100%;
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      touch-action: none;
    }
    .fs-track::-webkit-scrollbar { display: none; }
    .fs-slide {
      flex: 0 0 100%; height: 100%; scroll-snap-align: start;
      display: flex; align-items: center; justify-content: center;
    }
    .fs-slide img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 4px; cursor: zoom-in; will-change: transform; }
    .fs-gallery-close {
      position: absolute; top: 20px; right: 20px; z-index: 2;
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.12); color: #f4efe6; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease;
    }
    .fs-gallery-close:hover { background: rgba(255,255,255,0.2); }
    .fs-gallery-close svg { width: 20px; height: 20px; }
    .fs-gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: #f4efe6; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease;
    }
    .fs-gallery-nav:hover { background: rgba(255,255,255,0.2); }
    .fs-gallery-nav.prev { left: 20px; }
    .fs-gallery-nav.next { right: 20px; }
    .fs-gallery-nav svg { width: 20px; height: 20px; }
    .fs-dots {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 2;
      display: flex; gap: 8px;
    }
    .fs-dot {
      width: 7px; height: 7px; border-radius: 50%; border: none; padding: 0;
      background: rgba(244,239,230,0.35); cursor: pointer;
      transition: background 0.3s ease;
    }
    .fs-dot.active { background: var(--vermillion); }

    .post-title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .post-date {
      font-size: 15px; font-weight: 300; color: var(--ink-faint); font-style: italic; margin-bottom: 16px;
    }

    .post-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
    .post-tag {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 16px; background: var(--pill-bg); backdrop-filter: blur(8px);
      border: 1px solid var(--pill-border); border-radius: 100px; color: var(--ink-light);
      transition: border-color 0.3s ease, color 0.3s ease; text-decoration: none;
    }
    .post-tag:hover { border-color: rgba(212,84,74,0.3); color: var(--vermillion-muted); }

    .post-body {
      font-size: 17px; font-weight: 300; line-height: 1.9; color: var(--ink-light);
    }
    .post-body p { margin-bottom: 20px; }
    .post-body p:last-child { margin-bottom: 0; }
    .post-body strong { color: var(--ink); font-weight: 500; }
    .post-body a { color: var(--vermillion-muted); text-decoration: underline; text-underline-offset: 3px; }
    .post-body a:hover { color: var(--vermillion); }
    .post-body img { max-width: 100%; margin: 16px 0; border-radius: 2px; }
    .post-body h2 { font-family: var(--font-display); font-size: 26px; font-weight: 500; color: var(--ink); margin: 36px 0 12px; }
    .post-body h3 { font-family: var(--font-display); font-size: 21px; font-weight: 500; color: var(--ink); margin: 28px 0 8px; }
    .post-body ul, .post-body ol { margin: 0 0 20px 24px; }
    .post-body li { margin-bottom: 8px; }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .post-body blockquote { border-left: 3px solid var(--vermillion); padding-left: 20px; margin: 20px 0; color: var(--ink-wash); font-style: italic; }
    .post-body h2, .post-body h3 { scroll-margin-top: 80px; }

    /* ─── Table of Contents (Sidebar) ─── */
    .toc-sidebar {
      display: none; position: fixed; top: 120px;
      left: calc(50% + 390px); width: 180px;
      max-height: calc(100vh - 200px); overflow-y: auto;
      scrollbar-width: none; z-index: 10;
    }
    .toc-sidebar::-webkit-scrollbar { display: none; }
    .toc-sidebar.visible { display: block; }
    .toc-sidebar .toc-title {
      font-family: var(--font-display); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint);
      margin-bottom: 12px; display: flex; align-items: baseline; gap: 6px;
    }
    .toc-sidebar .toc-title .cn { font-family: var(--font-brush); font-size: 16px; text-transform: none; letter-spacing: 0; }
    .toc-sidebar .toc-list { list-style: none; border-left: 1px solid var(--border); }
    .toc-sidebar .toc-item {
      padding: 4px 0 4px 14px; margin-left: -1px;
      border-left: 2px solid transparent;
      transition: border-color 0.3s ease;
    }
    .toc-sidebar .toc-item.depth-3 { padding-left: 26px; }
    .toc-sidebar .toc-item a {
      font-size: 12.5px; color: var(--ink-wash); text-decoration: none;
      line-height: 1.5; transition: color 0.3s ease; display: block;
    }
    .toc-sidebar .toc-item a:hover { color: var(--ink); }
    .toc-sidebar .toc-item.active { border-left-color: var(--vermillion); }
    .toc-sidebar .toc-item.active a { color: var(--ink); }
    @media (max-width: 1199px) { .toc-sidebar.visible { display: none; } }

    /* ─── Table of Contents (Mobile) ─── */
    .toc-mobile {
      display: none; margin-bottom: 28px;
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .toc-mobile.visible { display: block; }
    .toc-mobile-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 12px 16px; background: none; border: none;
      font-family: var(--font-display); font-size: 14px; font-weight: 500;
      color: var(--ink-light); cursor: pointer;
    }
    .toc-mobile-toggle .cn { font-family: var(--font-brush); font-size: 18px; }
    .toc-mobile-toggle svg {
      width: 14px; height: 14px; color: var(--ink-faint);
      transition: transform 0.3s ease;
    }
    .toc-mobile.open .toc-mobile-toggle svg { transform: rotate(180deg); }
    .toc-mobile .toc-list {
      list-style: none; padding: 0 16px 0; max-height: 0;
      overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .toc-mobile.open .toc-list { max-height: 500px; padding-bottom: 12px; }
    .toc-mobile .toc-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .toc-mobile .toc-item:last-child { border-bottom: none; }
    .toc-mobile .toc-item.depth-3 { padding-left: 16px; }
    .toc-mobile .toc-item a { font-size: 14px; color: var(--ink-wash); text-decoration: none; transition: color 0.3s ease; }
    .toc-mobile .toc-item a:hover { color: var(--ink); }
    @media (min-width: 1200px) { .toc-mobile.visible { display: none; } }

    /* ─── Comments ─── */
    .comments {
      margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--border);
    }
    .comments-title {
      font-family: var(--font-display); font-size: 22px; font-weight: 500;
      margin-bottom: 20px; display: flex; align-items: baseline; gap: 8px;
    }
    .comments-title .cn { font-family: var(--font-brush); font-size: 26px; color: var(--ink-wash); }

    .giscus-frame { min-height: 150px; }

    /* ─── Post Nav ─── */
    .post-nav {
      margin-top: 56px; padding-top: 28px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
    }
    .post-nav a {
      font-size: 14px; color: var(--ink-wash); display: flex; align-items: center; gap: 6px; transition: color 0.3s ease;
    }
    .post-nav a:hover { color: var(--ink); }
    .post-nav .cn { font-family: var(--font-brush); font-size: 16px; }
    .post-nav .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); }
    .post-nav .prev-next-title { font-family: var(--font-display); font-size: 17px; font-weight: 500; color: var(--ink-light); }
    .post-nav-item { display: flex; flex-direction: column; gap: 2px; }
    .post-nav-item.next { text-align: right; align-items: flex-end; }

    /* ─── Footer ─── */
    .footer {
      position: relative; z-index: 1; padding: 24px 40px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-text { font-size: 12px; color: var(--ink-faint); }

    /* ─── Theme Toggle ─── */
    .theme-toggle {
      background: none; border: none; padding: 6px; cursor: pointer;
      color: var(--ink-faint); font-size: 16px; line-height: 1;
      transition: color 0.3s ease; margin-left: auto;
    }
    .theme-toggle:hover { color: var(--ink); }

    /* ─── Fade ─── */
    .fade { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .fade-d1 { animation-delay: 0.05s; }
    .fade-d2 { animation-delay: 0.1s; }
    .fade-d3 { animation-delay: 0.15s; }
    .fade-d4 { animation-delay: 0.2s; }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .filter-toggle { display: block; }
      .filter-overlay { display: block; }
    }

    @media (max-width: 600px) {
      .post { padding: 88px 20px 60px; }
      .post-image { margin-left: -20px; margin-right: -20px; width: calc(100% + 40px); }
      .footer { padding: 20px; flex-direction: column; gap: 10px; }
      .post-nav { flex-direction: column; align-items: stretch; }
      .post-nav-item.next { text-align: left; align-items: flex-start; }
    }

    @media (max-width: 560px) {
      .top-bar { left: 12px; right: 12px; transform: none; }
    }
  </style>
  <script src="js/theme.js"></script>
</head>

<body>
  <div class="bg-ink"><img src="assets/bg/post.jpg" alt="" aria-hidden="true"></div>

  <div class="top-bar">
    <a href="index.html" class="top-seal">夏</a>
    <a href="gallery.html" class="top-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span class="cn">集</span> Gallery
    </a>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">☀</button>
    <button class="filter-toggle" id="filterToggle" aria-label="Filter posts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
    </button>
  </div>

  <!-- Mobile filter overlay -->
  <div class="filter-overlay" id="filterOverlay">
    <div class="filter-panel">
      <ul class="cat-list" id="mobile-cat-list"></ul>
    </div>
  </div>

  <nav class="toc-sidebar" id="toc-sidebar"></nav>
  <article class="post" id="post"></article>

  <footer class="footer">
    <span class="footer-text">&copy; 2026 Forest Xia</span>
  </footer>

  <!-- Fullscreen gallery -->
  <div class="fs-gallery" id="fsGallery">
    <button class="fs-gallery-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="fs-gallery-nav prev" data-dir="-1" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="fs-track" id="fsTrack"></div>
    <button class="fs-gallery-nav next" data-dir="1" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
    <div class="fs-dots" id="fsDots"></div>
  </div>

  <script src="js/site.js"></script>
  <script src="js/posts.js"></script>
  <script>
    /* ─── Mobile filter ─── */
    const tagCN = site.tagCN;
      const tagMap = {};
      posts.forEach(p => p.tags.forEach(t => { tagMap[t] = (tagMap[t]||0)+1; }));
      let html = `<li><a href="gallery.html" class="cat-btn"><span class="cn">全</span> All <span class="cat-count">${posts.length}</span></a></li>`;
      Object.entries(tagMap).sort((a,b)=>b[1]-a[1]).forEach(([tag,count]) => {
        const cn = tagCN[tag]||'';
        html += `<li><a href="gallery.html?cat=${encodeURIComponent(tag)}" class="cat-btn">${cn?`<span class="cn">${cn}</span> `:''}${tag} <span class="cat-count">${count}</span></a></li>`;
      });
      document.getElementById('mobile-cat-list').innerHTML = html;

      const overlay = document.getElementById('filterOverlay');
      document.getElementById('filterToggle').addEventListener('click', () => overlay.classList.toggle('open'));
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

      /* ─── Post ─── */
      const slug = new URLSearchParams(window.location.search).get('id');
      const postIdx = posts.findIndex(p => p.slug === slug);
      const post = posts[postIdx];

      if (!post) {
        document.getElementById('post').innerHTML = '<p>Post not found.</p>';
      } else {

      document.title = `${post.title} — Forest Xia`;
      const postDesc = post.body.replace(/<[^>]*>/g, '').slice(0, 160);
      const postUrl = `https://xmiji.com/post.html?id=${post.slug}`;
      const postImage = `https://xmiji.com/${post.image}`;

      // Update meta description
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.content = postDesc;

      // Update canonical URL
      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.href = postUrl;

      // Update hreflang URLs
      document.querySelectorAll('link[hreflang]').forEach(l => l.href = postUrl);

      // Update Open Graph tags
      const ogUpdates = { 'og:title': `${post.title} — Forest Xia`, 'og:description': postDesc, 'og:url': postUrl, 'og:image': postImage };
      Object.entries(ogUpdates).forEach(([prop, val]) => {
        const el = document.querySelector(`meta[property="${prop}"]`);
        if (el) el.content = val;
      });

      // Update Twitter Card tags
      const twUpdates = { 'twitter:title': `${post.title} — Forest Xia`, 'twitter:description': postDesc, 'twitter:image': postImage };
      Object.entries(twUpdates).forEach(([name, val]) => {
        const el = document.querySelector(`meta[name="${name}"]`);
        if (el) el.content = val;
      });

      // Inject JSON-LD structured data
      const ldJson = document.createElement('script');
      ldJson.type = 'application/ld+json';
      ldJson.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": post.title,
        "description": postDesc,
        "image": postImage,
        "url": postUrl,
        "datePublished": post.date,
        "author": { "@type": "Person", "name": "Forest Xia", "alternateName": ["Mingyou Xia", "夏明有"], "url": "https://xmiji.com" },
        "publisher": { "@type": "Person", "name": "Forest Xia", "url": "https://xmiji.com" },
        "keywords": post.tags.join(', ')
      });
      document.head.appendChild(ldJson);

      function formatDate(d) {
        return new Date(d+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
      }

      // Lightweight markdown → HTML (supports body content that isn't already HTML)
      function md(text) {
        if (!text || text.trim().startsWith('<')) return text; // already HTML
        return text
          .replace(/^### (.+)$/gm, '<h3>$1</h3>')
          .replace(/^## (.+)$/gm, '<h2>$1</h2>')
          .replace(/^---$/gm, '<hr>')
          .replace(/^\> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
          .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
          .replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
          .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
          .replace(/(?:^|\n)(<li>.*<\/li>\n?)+/g, m => '<ol>' + m.trim() + '</ol>')
          .split(/\n{2,}/)
          .map(block => {
            block = block.trim();
            if (!block) return '';
            if (/^<(?:h[23]|ul|ol|hr|blockquote)/.test(block)) return block;
            return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
          })
          .join('\n');
      }

      const prev = posts[postIdx + 1] || null;
      const next = posts[postIdx - 1] || null;

      const imgs = post.images && post.images.length > 0 ? post.images : [post.image];
      let imageHTML;
      if (imgs.length === 1) {
        imageHTML = `<div class="post-image fade"><img src="${imgs[0]}" alt="${post.title}"></div>`;
      } else {
        const arrowSvgL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
        const arrowSvgR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';
        imageHTML = `<div class="post-carousel fade">
          <button class="post-carousel-nav prev" data-dir="-1">${arrowSvgL}</button>
          <button class="post-carousel-nav next" data-dir="1">${arrowSvgR}</button>
          <div class="post-carousel-track">${imgs.map((src,i) => `<div class="post-carousel-slide" data-idx="${i}"><img src="${src}" alt="${post.title} ${i+1}"></div>`).join('')}</div>
          <div class="post-carousel-dots">${imgs.map((_,i) => `<button class="post-carousel-dot${i===0?' active':''}" data-idx="${i}"></button>`).join('')}</div>
        </div>`;
      }

      const titleDisplay = post.titleCn ? `${post.title} <span style="font-family:var(--font-brush);font-size:0.7em;color:var(--ink-wash);margin-left:8px">${post.titleCn}</span>` : post.title;

      document.getElementById('post').innerHTML = `
        ${imageHTML}
        <h1 class="post-title fade fade-d1">${titleDisplay}</h1>
        <time class="post-date fade fade-d2">${formatDate(post.date)}</time>
        <div class="post-tags fade fade-d2">${post.tags.map(t => `<a href="gallery.html?cat=${encodeURIComponent(t)}" class="post-tag">${t}</a>`).join('')}</div>
        <nav class="toc-mobile fade fade-d3" id="toc-mobile">
          <button class="toc-mobile-toggle" onclick="this.parentElement.classList.toggle('open')">
            <span><span class="cn">目</span> Contents</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <ul class="toc-list"></ul>
        </nav>
        <div class="post-body fade fade-d3">${md(post.body)}</div>

        <nav class="post-nav fade fade-d4">
          ${prev ? `<a href="post.html?id=${prev.slug}" class="post-nav-item"><span class="label">← Older</span><span class="prev-next-title">${prev.title}</span></a>` : '<span></span>'}
          ${next ? `<a href="post.html?id=${next.slug}" class="post-nav-item next"><span class="label">Newer →</span><span class="prev-next-title">${next.title}</span></a>` : '<span></span>'}
        </nav>

        <div class="comments fade fade-d4">
          <h3 class="comments-title"><span class="cn">议</span> Comments</h3>
          <div class="giscus-frame" id="giscus-container"></div>
        </div>
      `;

      // Open external links in new tab
      document.querySelectorAll('.post-body a[href^="http"]').forEach(a => {
        a.target = '_blank';
        a.rel = 'noopener';
      });

      // Table of contents
      (function() {
        const postBody = document.querySelector('.post-body');
        const headings = postBody.querySelectorAll('h2, h3');
        if (headings.length < 2) return;

        const items = [];
        headings.forEach((h, i) => {
          const id = 'toc-' + i;
          h.id = id;
          items.push({ id, text: h.textContent, depth: h.tagName === 'H3' ? 3 : 2 });
        });

        const tocHTML = items.map(item =>
          `<li class="toc-item depth-${item.depth}"><a href="#${item.id}">${item.text}</a></li>`
        ).join('');

        // Desktop sidebar
        const sidebar = document.getElementById('toc-sidebar');
        sidebar.innerHTML = '<div class="toc-title"><span class="cn">目</span> Contents</div><ul class="toc-list">' + tocHTML + '</ul>';
        sidebar.classList.add('visible');

        // Mobile inline
        const mobile = document.getElementById('toc-mobile');
        mobile.querySelector('.toc-list').innerHTML = tocHTML;
        mobile.classList.add('visible');

        // Active heading tracking
        function updateActive() {
          const scrollY = window.scrollY + 140;
          let activeId = items[0].id;
          for (const item of items) {
            const el = document.getElementById(item.id);
            if (el && el.offsetTop <= scrollY) activeId = item.id;
          }
          sidebar.querySelectorAll('.toc-item').forEach(el => {
            el.classList.toggle('active', el.querySelector('a').getAttribute('href') === '#' + activeId);
          });
        }
        window.addEventListener('scroll', updateActive, { passive: true });
        updateActive();
      })();

      // Giscus comments
      const giscusScript = document.createElement('script');
      giscusScript.src = 'https://giscus.app/client.js';
      giscusScript.setAttribute('data-repo', 'forest0xia/xmiji');
      giscusScript.setAttribute('data-repo-id', 'R_kgDORtJgRQ');
      giscusScript.setAttribute('data-category', 'Comments');
      giscusScript.setAttribute('data-category-id', 'DIC_kwDORtJgRc4C4_YU');
      giscusScript.setAttribute('data-mapping', 'specific');
      giscusScript.setAttribute('data-term', post.slug);
      giscusScript.setAttribute('data-strict', '0');
      giscusScript.setAttribute('data-reactions-enabled', '1');
      giscusScript.setAttribute('data-emit-metadata', '0');
      giscusScript.setAttribute('data-input-position', 'top');
      giscusScript.setAttribute('data-theme', 'light_protanopia');
      giscusScript.setAttribute('data-lang', 'en');
      giscusScript.setAttribute('data-loading', 'lazy');
      giscusScript.crossOrigin = 'anonymous';
      giscusScript.async = true;
      document.getElementById('giscus-container').appendChild(giscusScript);

      // Carousel
      const track = document.querySelector('.post-carousel-track');
      const dots = document.querySelectorAll('.post-carousel-dot');
      const navBtns = document.querySelectorAll('.post-carousel-nav');

      function scrollToSlide(idx) {
        if (!track) return;
        track.scrollTo({ left: idx * track.offsetWidth, behavior: 'smooth' });
      }
      function currentIdx() {
        return track ? Math.round(track.scrollLeft / track.offsetWidth) : 0;
      }

      if (track && dots.length > 0) {
        track.addEventListener('scroll', () => {
          const idx = currentIdx();
          dots.forEach((d,i) => d.classList.toggle('active', i === idx));
        });
        dots.forEach(d => d.addEventListener('click', () => scrollToSlide(+d.dataset.idx)));
        navBtns.forEach(b => b.addEventListener('click', () => {
          const total = imgs.length;
          let next = currentIdx() + (+b.dataset.dir);
          if (next < 0) next = total - 1;
          if (next >= total) next = 0;
          scrollToSlide(next);
        }));

        document.querySelectorAll('.post-carousel-slide').forEach(s => {
          s.addEventListener('click', () => openFsGallery(+s.dataset.idx));
        });
      }

      // Fullscreen gallery
      const fsEl = document.getElementById('fsGallery');
      const fsTrack = document.getElementById('fsTrack');
      const fsDots = document.getElementById('fsDots');
      let fsIdx = 0;

      // Zoom & gesture state
      let fsScale = 1, fsTranslateX = 0, fsTranslateY = 0;
      let fsTapLast = 0, fsTapLastX = 0, fsTapLastY = 0;
      let fsTouchStart = null, fsPinchStart = null, fsIsPanning = false;
      let fsLastWasTouch = false;

      function getFsImg() { return fsTrack.children[fsIdx]?.querySelector('img') || null; }

      function applyFsZoom(img, animated) {
        img.style.transition = animated ? 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)' : '';
        img.style.transform = `translate(${fsTranslateX}px,${fsTranslateY}px) scale(${fsScale})`;
        img.style.cursor = fsScale > 1 ? 'grab' : 'zoom-in';
      }

      function clampFsTranslate(img) {
        const mX = img.offsetWidth * (fsScale - 1) / 2;
        const mY = img.offsetHeight * (fsScale - 1) / 2;
        fsTranslateX = Math.max(-mX, Math.min(mX, fsTranslateX));
        fsTranslateY = Math.max(-mY, Math.min(mY, fsTranslateY));
      }

      function resetFsZoom(animated) {
        fsScale = 1; fsTranslateX = 0; fsTranslateY = 0;
        const img = getFsImg();
        if (img) {
          img.style.transition = animated ? 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)' : '';
          img.style.transform = '';
          img.style.cursor = 'zoom-in';
          if (animated) setTimeout(() => { if (img) img.style.transition = ''; }, 300);
        }
      }

      function fsToggleZoom(cx, cy) {
        const img = getFsImg();
        if (!img) return;
        if (fsScale > 1) {
          resetFsZoom(true);
        } else {
          fsScale = 2.5;
          const r = img.getBoundingClientRect();
          const cxRel = cx - (r.left + r.width / 2);
          const cyRel = cy - (r.top + r.height / 2);
          fsTranslateX = cxRel * (1 - fsScale);
          fsTranslateY = cyRel * (1 - fsScale);
          clampFsTranslate(img);
          applyFsZoom(img, true);
        }
      }

      imgs.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'fs-slide';
        const img = document.createElement('img');
        img.src = src; img.alt = post.title + ' ' + (i + 1);
        slide.appendChild(img);
        fsTrack.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = 'fs-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', 'Go to image ' + (i + 1));
        dot.addEventListener('click', () => { resetFsZoom(false); fsIdx = i; scrollFsTo(i); updateFsDots(); });
        fsDots.appendChild(dot);
      });

      if (imgs.length <= 1) {
        fsDots.style.display = 'none';
        fsEl.querySelectorAll('.fs-gallery-nav').forEach(b => b.style.display = 'none');
      }

      function scrollFsTo(idx) {
        fsTrack.scrollTo({ left: idx * fsTrack.offsetWidth, behavior: 'smooth' });
      }
      function updateFsDots() {
        fsDots.querySelectorAll('.fs-dot').forEach((d, i) => d.classList.toggle('active', i === fsIdx));
      }
      function openFsGallery(idx) {
        fsIdx = idx; resetFsZoom(false);
        fsEl.classList.add('open');
        requestAnimationFrame(() => { fsTrack.scrollLeft = idx * fsTrack.offsetWidth; updateFsDots(); });
      }
      function closeFsGallery() { resetFsZoom(false); fsEl.classList.remove('open'); }
      function fsNav(dir) {
        resetFsZoom(false);
        fsIdx = (fsIdx + dir + imgs.length) % imgs.length;
        scrollFsTo(fsIdx); updateFsDots();
      }

      fsTrack.addEventListener('scroll', () => {
        fsIdx = Math.round(fsTrack.scrollLeft / fsTrack.offsetWidth);
        updateFsDots();
      }, { passive: true });

      // Touch: pinch-to-zoom, double-tap toggle, swipe to navigate, pan when zoomed
      fsTrack.addEventListener('touchstart', e => {
        fsLastWasTouch = true;
        if (e.touches.length === 2) {
          e.preventDefault();
          fsTouchStart = null;
          fsPinchStart = {
            dist: Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY),
            scale: fsScale, tx: fsTranslateX, ty: fsTranslateY
          };
        } else if (e.touches.length === 1) {
          const t = e.touches[0], now = Date.now();
          if (now - fsTapLast < 300 && Math.hypot(t.clientX - fsTapLastX, t.clientY - fsTapLastY) < 40) {
            e.preventDefault();
            fsToggleZoom(t.clientX, t.clientY);
            fsTapLast = 0;
          } else {
            fsTapLast = now; fsTapLastX = t.clientX; fsTapLastY = t.clientY;
            fsTouchStart = { x: t.clientX, y: t.clientY, tx: fsTranslateX, ty: fsTranslateY };
            fsIsPanning = false;
          }
        }
      }, { passive: false });

      fsTrack.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && fsPinchStart) {
          e.preventDefault();
          const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
          fsScale = Math.max(1, Math.min(5, fsPinchStart.scale * dist / fsPinchStart.dist));
          const img = getFsImg();
          if (img) { clampFsTranslate(img); applyFsZoom(img, false); }
        } else if (e.touches.length === 1 && fsTouchStart) {
          const t = e.touches[0], dx = t.clientX - fsTouchStart.x, dy = t.clientY - fsTouchStart.y;
          if (fsScale > 1) {
            e.preventDefault();
            fsIsPanning = true;
            fsTranslateX = fsTouchStart.tx + dx;
            fsTranslateY = fsTouchStart.ty + dy;
            const img = getFsImg();
            if (img) { clampFsTranslate(img); applyFsZoom(img, false); }
          } else if (Math.abs(dx) > Math.abs(dy)) {
            e.preventDefault();
            fsTrack.scrollLeft = fsIdx * fsTrack.offsetWidth - dx;
          }
        }
      }, { passive: false });

      fsTrack.addEventListener('touchend', e => {
        if (fsTouchStart && !fsIsPanning) {
          const t = e.changedTouches[0], dx = t.clientX - fsTouchStart.x;
          if (fsScale === 1 && Math.abs(dx) > 48) {
            fsNav(dx < 0 ? 1 : -1);
          } else {
            scrollFsTo(fsIdx);
          }
        }
        if (fsScale < 1.05) resetFsZoom(false);
        fsTouchStart = null; fsPinchStart = null; fsIsPanning = false;
      });

      // Mouse wheel zoom (desktop/trackpad)
      fsTrack.addEventListener('wheel', e => {
        if (!fsEl.classList.contains('open')) return;
        e.preventDefault();
        fsScale = Math.max(1, Math.min(5, fsScale * (e.deltaY < 0 ? 1.12 : 0.89)));
        const img = getFsImg();
        if (img) { clampFsTranslate(img); applyFsZoom(img, false); }
      }, { passive: false });

      // Desktop: single click image to zoom, click dark area to close
      fsTrack.addEventListener('click', e => {
        if (fsLastWasTouch) { fsLastWasTouch = false; return; }
        if (e.target.tagName === 'IMG') {
          fsToggleZoom(e.clientX, e.clientY);
        } else if (fsScale === 1) {
          closeFsGallery();
        }
      });

      if (fsEl) {
        fsEl.querySelector('.fs-gallery-close').addEventListener('click', closeFsGallery);
        fsEl.querySelectorAll('.fs-gallery-nav').forEach(b => {
          b.addEventListener('click', e => { e.stopPropagation(); fsNav(+b.dataset.dir); });
        });
        document.addEventListener('keydown', e => {
          if (!fsEl.classList.contains('open')) return;
          if (e.key === 'Escape') closeFsGallery();
          if (e.key === 'ArrowLeft') fsNav(-1);
          if (e.key === 'ArrowRight') fsNav(1);
        });
      }
      }
  </script>

</body>
</html>
